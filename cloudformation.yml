AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 server for DevOps demo with Apache and CodeDeploy agent installed.

Parameters:
  KeyName:
    Type: String
    Description: Name of an existing EC2 key pair

Resources:

  DevOpsInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: DevOpsInstanceRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonEC2RoleforAWSCodeDeploy
        - arn:aws:iam::aws:policy/AmazonS3FullAccess

  DevOpsInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref DevOpsInstanceRole
      InstanceProfileName: DevOpsInstanceProfile

  DevOpsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  DevOpsEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316  # Amazon Linux 2 for eu-west-1 (update region if needed)
      KeyName: !Ref KeyName
      IamInstanceProfile: !Ref DevOpsInstanceProfile
      SecurityGroupIds:
        - !Ref DevOpsSecurityGroup
      Tags:
        - Key: Name
          Value: DevOpsDemoServer
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          sudo yum update -y
          sudo yum install -y httpd
          sudo systemctl start httpd
          sudo systemctl enable httpd
          sudo yum install -y ruby wget
          cd /home/ec2-user
          wget https://aws-codedeploy-${AWS::Region}.s3.${AWS::Region}.amazonaws.com/latest/install
          chmod +x ./install
          sudo ./install auto
          sudo systemctl enable codedeploy-agent
          sudo systemctl start codedeploy-agent
          echo "httpd and codedeploy installed!"
